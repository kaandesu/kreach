# Kreach monorepo — production-shaped orchestration.
#
# Two independent services:
#   frontend   (Vite React) -> internal port 3000
#   backend    (Go/PocketBase API) -> internal port 8080
#
# Local dev: `docker compose up --build` also loads docker-compose.override.yml
#            automatically (hot reload + bind mounts).
# Deploy:    `docker compose -f docker-compose.yml up -d --build`
#            (the explicit -f skips the dev override and lets the platform
#            router connect to exposed container ports).

services:
  backend:
    build:
      context: ./backend
    image: kreach-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PORT: "8080"
    volumes:
      - pb_data:/app/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kreach

  frontend:
    build:
      context: ./frontend
      args:
        VITE_PB_URL: "${VITE_PB_URL:-http://localhost:8080}"
        VITE_SEND_ROUTE: "${VITE_SEND_ROUTE:-/api/emails/send}"
    image: kreach-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      VITE_PB_URL: "${VITE_PB_URL:-http://localhost:8080}"
      VITE_SEND_ROUTE: "${VITE_SEND_ROUTE:-/api/emails/send}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - kreach

volumes:
  pb_data:

networks:
  kreach:
